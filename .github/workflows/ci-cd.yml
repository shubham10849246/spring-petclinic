name: Production CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: petclinic

jobs:

  build-test-sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}

      - name: Build + Test + Sonar
        run: |
          mvn clean verify sonar:sonar \
            -Dcheckstyle.skip=true \
            -Dspring.docker.compose.skip.in-tests=true \
            -Dtest='!*Postgres*' \
            -Dsonar.projectKey=petclinic \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  performance-test:
    runs-on: ubuntu-latest
    needs: build-test-sonar

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install JMeter
        run: |
          sudo apt update
          sudo apt install -y jmeter

      - name: Run Performance Test
        run: |
          jmeter -n \
            -t jmeter/test-plan.jmx \
            -l results.jtl

  docker-nexus:
    runs-on: ubuntu-latest
    needs: performance-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Tag Image
        run: |
          docker tag $IMAGE_NAME:${{ github.sha }} \
          ${{ secrets.NEXUS_DOCKER_URL }}/$IMAGE_NAME:${{ github.sha }}

      - name: Login to Nexus
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | docker login \
          https://${{ secrets.NEXUS_DOCKER_URL }} \
          -u ${{ secrets.NEXUS_USERNAME }} --password-stdin

      - name: Push Image
        run: |
          docker push ${{ secrets.NEXUS_DOCKER_URL }}/$IMAGE_NAME:${{ github.sha }}

      - name: Tag Latest
        run: |
          docker tag ${{ secrets.NEXUS_DOCKER_URL }}/$IMAGE_NAME:${{ github.sha }} \
          ${{ secrets.NEXUS_DOCKER_URL }}/$IMAGE_NAME:latest

      - name: Push Latest
        run: |
          docker push ${{ secrets.NEXUS_DOCKER_URL }}/$IMAGE_NAME:latest
